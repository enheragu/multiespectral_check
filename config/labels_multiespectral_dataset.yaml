# Multiespectral Urban Dataset - Label Configuration
# Version: 1.0.0
#
# This configuration defines the labeling schema for multiespectral (LWIR + Visible)
# urban detection datasets. It separates Permanent Infrastructure from Dynamic Agents
# and includes universal + class-specific attributes for bias analysis.

schema_version: "1.1.0"

dataset_meta:
  name: multiespectral_urban_dataset
  description: >
    Optimized urban detection schema. Separates Permanent Infrastructure from Dynamic Agents.
    Includes universal attributes for cross-category analysis and specific attributes for
    different classes to check for bias or handle complexity of certain situations
    (changes in vegetation, different types of vehicles, etc.).
  bbox_format: normalized_center_xywh  # [x_center, y_center, width, height] all in [0,1]

# Universal attributes applied to ALL annotations
universal_attrs:
  source:
    type: enum
    options: [auto, reviewed, manual]
    description: >
      Origin of the annotation:
      - auto: Suggested by detection model, not yet reviewed
      - reviewed: Auto-detected but manually reviewed and accepted
      - manual: Manually created from scratch (e.g., user drew the bbox)
  confidence:
    type: float
    range: [0, 1]
    description: Detection confidence score (from model if auto/reviewed)
  occlusion:
    type: enum
    options: [none, partial, heavy]
    description: Level of occlusion
  truncation:
    type: bool
    description: Whether the object is truncated at image boundary

# --------------------#
#  CLASS DEFINITIONS  #
# --------------------#

classes:
  # -----------------------------------------------------------#
  #  GROUP 1: Dynamic Objects (objects that move or can move)  #
  # -----------------------------------------------------------#

  - id: 1
    name: person
    description: Any human. Includes riders, pedestrians, workers, etc.
    group: dynamic
    aliases: [pedestrian, human, people]
    attributes:
      role:
        type: enum
        options: [pedestrian, rider]
      age_group:
        type: enum
        options: [adult, child]
      activity:
        type: enum
        options: [standing, sitting, lying]
      perceived_gender:
        type: enum
        options: [male, female, unknown]
  - id: 2
    name: car
    group: dynamic
    aliases: [vehicle, automobile]
    min_confidence: 0.35
    attributes:
      type:
        type: enum
        options: [small, large, van, utility, unknown]
        description: >
          small: sedan, hatchback, coupe, etc.
          large: SUV, pickup, etc.
          utility: small utility vehicles for paths/terrain
      state:
        type: enum
        options: [moving, stopped, parked]

  - id: 3
    name: heavy_vehicle
    group: dynamic
    aliases: [city bus, truck, lorry]
    attributes:
      class:
        type: enum
        options: [city_bus, truck, construction, mobile_crane]
      state:
        type: enum
        options: [moving, stopped, parked]

  - id: 4
    name: cycle
    description: Bicycles and Motorcycles (2-wheelers)
    group: dynamic
    aliases: [bicycle, motorcycle, motorbike, bike]
    attributes:
      propulsion:
        type: enum
        options: [bicycle, motorcycle, scooter]
      state:
        type: enum
        options: [moving, stopped, parked, fallen]
      rider_attached:
        type: bool

  - id: 5
    name: personal_mobility
    description: Wheelchairs, strollers, walkers
    group: dynamic
    attributes:
      type:
        type: enum
        options: [wheelchair, stroller, walker]
      user_visible:
        type: bool

  - id: 6
    name: animal
    group: dynamic
    aliases: [dog, cat, bird]
    attributes:
      type:
        type: enum
        options: [dog, cat, bird, wildlife]

  - id: 7
    name: loose_object
    description: >
      Portable objects that don't belong to the map. Can be labeled even when
      carried by a person (use 'carried' attribute to distinguish).
    group: dynamic
    aliases: [backpack, handbag, suitcase, cart]
    attributes:
      type:
        type: enum
        options: [trash_bag, box, cone, debris, bag, cart, trolley, umbrella]
        description: bag covers backpacks, handbags, suitcases, etc.
      carried:
        type: bool
        description: Whether the object is being carried/worn by a person

  - id: 8
    name: emergency_vehicle
    description: Emergency service vehicles with priority (lights/sirens)
    group: dynamic
    aliases: [police_car, ambulance, fire_truck]
    min_confidence: 0.40
    attributes:
      service:
        type: enum
        options: [police, ambulance, fire_dept, civil_protection]
      lights_active:
        type: bool
        description: Whether emergency lights are visibly active
      state:
        type: enum
        options: [moving, stopped]

  - id: 9
    name: construction_element
    description: Temporary construction/works elements
    group: dynamic
    aliases: [scaffolding, construction_barrier, construction_fence]
    attributes:
      type:
        type: enum
        options: [scaffolding, container, portable_fence, excavation, machinery]

  # -----------------------------------------------------#
  #  GROUP 2: Infrastructure (permanent static objects)  #
  # -----------------------------------------------------#

  - id: 10
    name: traffic_light
    group: infrastructure
    aliases: [traffic light, stoplight]
    attributes:
      state:
        type: enum
        options: [red, yellow, green, off, flashing]
      type:
        type: enum
        options: [vehicle, pedestrian, bicycle]
      shape:
        type: enum
        options: [circle, arrow]

  - id: 11
    name: traffic_sign
    description: Vertical fixed signage
    group: infrastructure
    aliases: [stop sign, stop_sign]
    attributes:
      shape:
        type: enum
        options: [circle, triangle, square, octagon, rectangle]
      category:
        type: enum
        options: [stop, yield, warning, limit, prohibition, info, electronic_vms]
        description: VMS = Variable Message Sign (electronic display)

  - id: 12
    name: street_furniture
    description: Fixed objects on sidewalk / public way
    group: infrastructure
    aliases: [bench, parking meter, parking_meter, fire hydrant, fire_hydrant, fire extinguisher, fire hose]
    attributes:
      type:
        type: enum
        options: [bench, trash_bin, lamp_post, utility_pole, parking_meter, fire_hydrant, fire_extinguisher, fire_hose, bus_shelter, ad_panel, bike_rack, chair]
      
  - id: 13
    name: barrier
    description: Permanent objects designed to block path
    group: infrastructure
    aliases: [guardrail, bollard]
    attributes:
      type:
        type: enum
        options: [metal_fence, bollard, guardrail, jersey_barrier]

  - id: 14
    name: vegetation
    description: >
      Discrete vegetation elements (NOT ground cover like grass/lawn).
      Always assign a type — generic "vegetation" detections without a
      specific type should be discarded (ground cover is segmentation scope).
    group: infrastructure
    aliases: [tree, palm tree, plant, shrub, bush]
    min_confidence: 0.40
    attributes:
      type:
        type: enum
        required: true
        options: [tree_trunk, tree_canopy, hedge, bush, potted_plant]
      foliage_state:
        type: enum
        options: [bare, sparse, dense]
        description: >
          Thermal signature varies significantly by season:
          bare = winter/dead (visible trunk, no leaf mass)
          sparse = partial foliage
          dense = full canopy (summer/evergreen)
  - id: 15
    name: doorway
    description: >
      Doors and entrances to buildings.
    group: infrastructure

  - id: 16
    name: crosswalk
    description: >
      Pedestrian crossings painted on road surface.
      Other road markings (lane lines, arrows, etc.) are segmentation scope.
    group: infrastructure
    aliases: [road_marking, zebra_crossing, pedestrian_crossing]


  # -------------------------------------------#
  #  GROUP 3: Specific Bremen Dataset classes  #
  # -------------------------------------------#

  - id: 17
    name: soil_probe
    description: >
      Lance/probe instrument used for taking soil samples.
    group: bremen_specific
    aliases: [lance, probe, sampling_lance]
    attributes:
      position:
        type: enum
        options: [on_support, in_ground, handheld, lying]
        description: >
          on_support: mounted on lance_support structure
          in_ground: inserted into soil for sampling
          handheld: being carried/used by person
          lying: on the ground, not in use

  - id: 18
    name: probe_support
    description: >
      Support/holder structure for soil probes. Can hold multiple probes (up to 4).
    group: bremen_specific
    aliases: [lance_support, probe_holder, lance_rack]
    attributes:
      probe_count:
        type: enum
        options: ["0", "1", "2", "3", "4"]
        description: Number of probes currently mounted on the support
